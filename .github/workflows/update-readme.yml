name: Update README with Latest Projects
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Fetch latest repos and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { data: repos } = await github.rest.repos.listForUser({
              username: 'kinjalss',
              sort: 'pushed',
              direction: 'desc',
              per_page: 10,
              type: 'public'
            });
            const filtered = repos
              .filter(r => !r.fork && r.name !== 'kinjalss')
              .slice(0, 3);
            const rows = filtered.map(repo => {
              const lang = repo.language || 'N/A';
              const desc = repo.description || 'No description yet.';
              const url  = repo.html_url;
              const name = repo.name;
              const stars = repo.stargazers_count;
              return `| 🔗 [**${name}**](${url}) | \`${lang}\` | ${desc} | ⭐ ${stars} |`;
            });
            const table = [
              '| Project | Language | Description | Stars |',
              '|---------|----------|-------------|-------|',
              ...rows
            ].join('\n');
            const block = `<!-- PROJECTS:START -->\n${table}\n<!-- PROJECTS:END -->`;
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!-- PROJECTS:START -->[\s\S]*?<!-- PROJECTS:END -->/,
              block
            );
            fs.writeFileSync('README.md', readme);
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: auto-update latest projects"
          git pull --rebase origin main
          git push
